<script>



/* =========================
HERO SLIDER
========================= */

const heroSlides =
document.querySelectorAll(".hero-slide");

let heroIndex = 0;

function showHeroSlide(){

  heroSlides.forEach((slide)=>{
    slide.classList.remove("active");
  });

  heroSlides[heroIndex]
  .classList.add("active");

  heroIndex++;

  if(heroIndex >= heroSlides.length){
    heroIndex = 0;
  }

}

setInterval(showHeroSlide, 3000);




/* =========================
ADVERTISEMENT SLIDER
========================= */

const adSlides =
document.querySelectorAll(".ad-slide");

const dots =
document.querySelectorAll(".dot");

let adIndex = 0;

function showAds(){

  adSlides.forEach((slide)=>{
    slide.classList.remove("active");
  });

  dots.forEach((dot)=>{
    dot.classList.remove("active");
  });

  adSlides[adIndex]
  .classList.add("active");

  dots[adIndex]
  .classList.add("active");

  adIndex++;

  if(adIndex >= adSlides.length){
    adIndex = 0;
  }

}

setInterval(showAds, 3000);




/* =========================
LOAD PRODUCTS FROM SUPABASE
========================= */

async function loadProducts(){

  const container =
  document.getElementById("productsContainer");

  container.innerHTML =
  "<p style='padding:20px'>Loading...</p>";



  const { data, error } =
  await supabaseClient
  .from("products")
  .select("*");



  if(error){

    console.log(error);

    container.innerHTML =
    "Error loading products";

    return;
  }



  container.innerHTML = "";



  // GROUP PRODUCTS
  const categories = {};

  data.forEach((product)=>{

    const category =
    product.category.toLowerCase();

    if(!categories[category]){
      categories[category] = [];
    }

    categories[category].push(product);

  });




  // CREATE HTML
  for(let category in categories){

    let section =
    document.createElement("section");

    section.className =
    "product-section";

    section.setAttribute(
      "data-category",
      category
    );



    let cards = "";



    categories[category].forEach((item)=>{

      cards += `

<div class="product-card"
data-name="${item.title}">

  <div onclick='openDetail(
"${item.title}",
"${item.description}",
"${item.price}",
"${item.image}",
"${item.category}"
)'>

    <img src="${item.image}">

    <h3>${item.title}</h3>

    <p>${item.description}</p>

  </div>

  <div class="price-row">

    <span>₹${item.price}</span>

    <button onclick='addToCart(
"${item.title}",
"${item.description}",
"${item.price}",
"${item.image}"
)'>+</button>

  </div>

</div>

      `;

    });




    section.innerHTML = `

    <div class="section-title">

      <h2>${category}</h2>

      <span>See All</span>

    </div>



    <div class="product-slider">

      ${cards}

    </div>

    `;



    container.appendChild(section);

  }



  setupSearch();
  setupCategoryFilter();

}

loadProducts();




/* =========================
SEARCH
========================= */

function setupSearch(){

  const searchInput =
  document.getElementById("searchInput");

  searchInput.addEventListener("keyup", ()=>{

    const value =
    searchInput.value.toLowerCase();

    const cards =
    document.querySelectorAll(".product-card");



    cards.forEach((card)=>{

      const name =
      card.dataset.name.toLowerCase();

      if(name.includes(value)){

        card.style.display = "block";

      }

      else{

        card.style.display = "none";

      }

    });

  });

}




/* =========================
CATEGORY FILTER
========================= */

function setupCategoryFilter(){

  const catBtns =
  document.querySelectorAll(".cat-btn");

  const sections =
  document.querySelectorAll(".product-section");



  catBtns.forEach((btn)=>{

    btn.addEventListener("click", ()=>{

      catBtns.forEach((b)=>{
        b.classList.remove("active");
      });

      btn.classList.add("active");



      const category =
      btn.dataset.category;



      if(category === "all"){

        sections.forEach((section)=>{
          section.style.display = "block";
        });

      }

      else{

        sections.forEach((section)=>{

          if(
            section.dataset.category
            === category
          ){

            section.style.display = "block";

          }

          else{

            section.style.display = "none";

          }

        });

      }

    });

  });

}
/* =========================
ADD TO CART
========================= */

function addToCart(name, description, price, image){

  let cart =
  JSON.parse(localStorage.getItem("c25cart")) || [];

  const product = {
    name,
    description,
    price,
    image
  };

  cart.push(product);

  localStorage.setItem(
    "c25cart",
    JSON.stringify(cart)
  );

  showToast("Added to cart successfully");

  updateCartCount();

}

/* =========================
UPDATE CART COUNT
========================= */

function updateCartCount(){

  let cart =
  JSON.parse(localStorage.getItem("c25cart")) || [];

  const count =
  document.getElementById("cartCount");

  count.innerText = cart.length;

}

/* =========================
OPEN DETAIL PAGE
MULTIPLE CATEGORY PAGES
========================= */

function openDetail(
title,
description,
price,
image,
category
){

  const product = {
    title,
    description,
    price,
    image,
    category
  };

  localStorage.setItem(
    "selectedProduct",
    JSON.stringify(product)
  );

  // CATEGORY PAGES

  if(category.toLowerCase() === "bakery"){

    window.location.href =
    "detailbakery.html";

  }

  else if(
    category.toLowerCase() === "restaurant"
  ){

    window.location.href =
    "detailrestaurant.html";

  }

  else if(
    category.toLowerCase() === "drink"
  ){

    window.location.href =
    "detaildrink.html";

  }

  else if(
    category.toLowerCase() === "icecream"
  ){

    window.location.href =
    "detailicecream.html";

  }

  else{

    window.location.href =
    "detailrestaurant.html";

  }

}


/* =========================
START
========================= */

updateCartCount();

function loadUserLocation() {

  const user = JSON.parse(localStorage.getItem("c25user"));

  const display = document.getElementById("locationDisplay");

  if (!user) {
    display.innerText = "Please Login";
    return;
  }

  const pincode = user.pincode || "N/A";
  const location = user.location || "No Location";

  let showPincode = true;

  setInterval(() => {

    if (showPincode) {
      display.innerText = "Pincode: " + pincode;
    } else {
      display.innerText = location;
    }

    showPincode = !showPincode;

  }, 3000);

}

loadUserLocation();

</script>
<script>
function showToast(message, type = "success") {

  const icons = {
    success: `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="white"/>
        <path d="M10 14l-2.5-2.5L6 13l4 4 8-8-1.5-1.5z" fill="black"/>
      </svg>
    `,
    error: `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="white"/>
        <path d="M9 9l6 6M15 9l-6 6"
          stroke="black" stroke-width="2" stroke-linecap="round"/>
      </svg>
    `
  };

  const toast = document.createElement("div");
  toast.className = `toast ${type}`;

  toast.innerHTML = `
    ${icons[type]}
    <span>${message}</span>
  `;

  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add("show"), 50);

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}
</script>
