<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>C25 Cafe & Bakery</title>  <link rel="stylesheet" href="login.css">  </head>  <body>  <div class="container">    <!-- LOGO -->  <div class="logo">    <div class="logo-circle">  
    <img src="logo.png">  
  </div>    <h2>C25 Cafe & Bakery</h2>  </div>    <!-- FORM BOX -->    <div class="form-box">  <!-- LOGIN -->

  <input type="text"

  <input type="text"

  <input type="email"

  <!-- PINCODE -->

  </div>  
</div>  <!-- ================= JAVASCRIPT ================= -->  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>  <script>  
  
const client = window.supabase.createClient(  
  "https://sogyxzqvbquwrqlqpdaj.supabase.co",  
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"  
);  
  
/* ================= UI ================= */  
  
function showSignup(){  
  document.querySelector(".form-box").classList.add("active");  
}  
  
function showLogin(){  
  document.querySelector(".form-box").classList.remove("active");  
}  
  
let userLocation = "";  
let userLat = "";  
let userLng = "";  
  
/* ================= LOCATION ================= */  
  
function getLocation(){

if(!navigator.geolocation){
showToast("Geolocation not supported","error");
return;
}

showToast("Requesting location...","success");

navigator.geolocation.getCurrentPosition(
async (pos)=>{

userLat = pos.coords.latitude;
userLng = pos.coords.longitude;

try {
const res = await fetch(
`https://nominatim.openstreetmap.org/reverse?format=json&lat=${userLat}&lon=${userLng}`
);

const data = await res.json();

userLocation =
data.address.city ||
data.address.town ||
data.address.village ||
data.address.suburb ||
"Unknown";

document.getElementById("locationText").innerText = userLocation;

showToast("Location detected","success");

} catch(e){
showToast("Reverse geocode failed","error");
}

},
(error)=>{

switch(error.code){
case 1:
showToast("Permission denied","error");
break;
case 2:
showToast("Location unavailable","error");
break;
case 3:
showToast("Timeout","error");
break;
default:
showToast("Unknown error","error");
}
},
{
enableHighAccuracy: true,
timeout: 10000,
maximumAge: 0
}
);

}
  
/* ================= SIGNUP (AUTH + TABLE) ================= */  
  
async function signupUser(){  
  
const name = document.getElementById("name").value.trim();  
const phone = document.getElementById("phone").value.trim();  
const email = document.getElementById("email").value.trim().toLowerCase();  
const password = document.getElementById("password").value.trim();  
const pincode = document.getElementById("pincode").value;  
  
if(!name || !phone || !email || !password || !pincode){  
showToast("Fill all fields","error");  
return;  
}  
  
/* 1️⃣ AUTH SIGNUP (REAL SUPABASE USER) */  
  
const { data: authData, error: authError } =  
await client.auth.signUp({  
  email,  
  password  
});  
  
if(authError){  
showToast(authError.message,"error");  
return;  
}  
  
/* 2️⃣ SAVE PROFILE IN TABLE */  
  
const userId = authData.user.id;  
  
const { error } = await client.from("users").insert([{  
  id: userId,  
  name,  
  phone,  
  email,  
  pincode,  
  location: userLocation,  
  latitude: userLat,  
  longitude: userLng  
}]);  
  
if(error){  
showToast(error.message,"error");  
return;  
}  
  
/* 3️⃣ SAVE LOCAL */  
  
localStorage.setItem("c25user", JSON.stringify({  
  id: userId,  
  name,  
  email,  
  phone,  
  pincode,  
  location: userLocation  
}));  
  
showToast("Signup successful","success");  
  
setTimeout(()=>{  
window.location.href = "account.html";  
},1200);  
  
}  
  
/* ================= LOGIN ================= */  
  
async function loginUser(){

const email = document.getElementById("loginEmail").value.trim().toLowerCase();
const password = document.getElementById("loginPassword").value.trim();

if(!email || !password){
showToast("Enter email & password","error");
return;
}

const { data, error } = await client.auth.signInWithPassword({
email,
password
});

if(error){
showToast(error.message,"error");
return;
}

// GET USER PROFILE FROM TABLE
const { data: profile, error: pError } = await client
.from("users")
.select("*")
.eq("id", data.user.id)
.single();

if(pError){
showToast("Profile not found","error");
return;
}

localStorage.setItem("c25user", JSON.stringify(profile));

showToast("Welcome " + profile.name,"success");

window.location.href = "account.html";
}
  
/* ================= TOAST ================= */  
  
function showToast(message,type="success"){  
  
const toast = document.createElement("div");  
toast.className = `toast ${type}`;  
toast.innerHTML = `<span>${message}</span>`;  
  
document.body.appendChild(toast);  
  
setTimeout(()=>toast.classList.add("show"),50);  
  
setTimeout(()=>{  
toast.remove();  
},2500);  
  
}  
  
</script>  </body>  
</html>
