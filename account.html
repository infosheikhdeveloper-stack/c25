<script>
const client = window.supabase.createClient(
  "https://sogyxzqvbquwrqlqpdaj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"
);

/* CHECK LOGIN */
const savedUser = localStorage.getItem("c25user");

if(!savedUser){
  window.location.href = "login.html";
}

/* LOAD USER */
async function loadUser(){

  const user = JSON.parse(savedUser);

  const { data, error } = await client
    .from("users")
    .select("*")
    .eq("email", user.email)
    .maybeSingle();

  if(error || !data){
    alert("User not found");
    window.location.href = "login.html";
    return;
  }

  document.getElementById("userName").innerText = data.name;
  document.getElementById("userPhone").innerText = data.phone;
  document.getElementById("userEmail").innerText = data.email;
  document.getElementById("userPincode").innerText=
"Pincode : " + data.pincode;

document.getElementById("userLocation").innerText =
"Location : " + data.location;
  
}

loadUser();




/* LOGOUT */
function logoutUser(){

  localStorage.removeItem("c25user");

  window.location.href = "login.html";
}
</script>
