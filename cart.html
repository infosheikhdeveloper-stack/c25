<!-- =========================
JAVASCRIPT
========================= -->

<script>

/* =========================
LOAD CART
========================= */

let cart =
JSON.parse(localStorage.getItem("c25cart")) || [];

const cartContainer =
document.getElementById("cartContainer");

const emptyCart =
document.getElementById("emptyCart");

const subtotal =
document.getElementById("subtotal");

const total =
document.getElementById("total");

/* =========================
RENDER CART
========================= */

function renderCart(){

  cartContainer.innerHTML = "";

  let subtotalPrice = 0;

  if(cart.length === 0){
    emptyCart.style.display = "block";
    subtotal.innerText = "₹0";
    total.innerText = "₹0";
    return;
  }

  emptyCart.style.display = "none";

  cart.forEach((item, index)=>{

    let itemTotal = Number(item.price) * (item.qty || 1);
    subtotalPrice += itemTotal;

    cartContainer.innerHTML += `
      <div class="cart-card">

        <img src="${item.image}">

        <div class="cart-info">

          <h3>${item.name}</h3>
          <p>${item.description}</p>

          <!-- QTY CONTROLS -->
          <div class="qty-box">

            <button onclick="decreaseQty(${index})">-</button>

            <span>${item.qty || 1}</span>

            <button onclick="increaseQty(${index})">+</button>

          </div>

          <div class="cart-bottom">

            <span>₹${itemTotal}</span>

            <button class="remove-btn"
            onclick="removeCart(${index})">

              <i class="fa-solid fa-xmark"></i>
              Cancel

            </button>

          </div>

        </div>

      </div>
    `;
  });

  subtotal.innerText = "₹" + subtotalPrice;
  total.innerText = "₹" + (subtotalPrice + 40);
}

/* =========================
INCREASE QTY
========================= */
function increaseQty(index){
  cart[index].qty = (cart[index].qty || 1) + 1;

  localStorage.setItem("c25cart", JSON.stringify(cart));
  renderCart();
}

/* =========================
DECREASE QTY
========================= */
function decreaseQty(index){

  if(!cart[index].qty) cart[index].qty = 1;

  if(cart[index].qty > 1){
    cart[index].qty -= 1;
  } else {
    cart.splice(index, 1);
  }

  localStorage.setItem("c25cart", JSON.stringify(cart));
  renderCart();
}

function removeCart(index){

  cart.splice(index,1);

  localStorage.setItem(
    "c25cart",
    JSON.stringify(cart)
  );

  renderCart();

}


/* =========================
START
========================= */

renderCart();

function loadUserLocation() {

  const user = JSON.parse(localStorage.getItem("c25user"));

  const display = document.getElementById("locationDisplay");

  if (!user) {
    display.innerText = "Please Login";
    return;
  }

  const pincode = user.pincode || "N/A";
  const location = user.location || "No Location";

  let showPincode = true;

  setInterval(() => {

    if (showPincode) {
      display.innerText = "Pincode: " + pincode;
    } else {
      display.innerText = location;
    }

    showPincode = !showPincode;

  }, 3000);

}

loadUserLocation();

function goToDetail() {

  const user =
  JSON.parse(localStorage.getItem("c25user"));

  /* CHECK LOGIN */

  if(!user || !user.email){

  showToast("Please login first", "error");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1800);

  return;
}

  /* CHECK EMPTY CART */

  if(cart.length === 0){

    showToast("Your cart is empty");

    return;
  }

  localStorage.setItem(
    "cartBackup",
    JSON.stringify(cart)
  );

  window.location.href = "detail.html";
}
</script>
<script src="back.js"></script>

<script>
function showToast(message, type = "success") {

  const icons = {
    success: `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="white"/>
        <path d="M10 14l-2.5-2.5L6 13l4 4 8-8-1.5-1.5z" fill="black"/>
      </svg>
    `,
    error: `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="white"/>
        <path d="M9 9l6 6M15 9l-6 6"
          stroke="black" stroke-width="2" stroke-linecap="round"/>
      </svg>
    `
  };

  const toast = document.createElement("div");
  toast.className = `toast ${type}`;

  toast.innerHTML = `
    ${icons[type]}
    <span>${message}</span>
  `;

  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add("show"), 50);

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}
</script>
