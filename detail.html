<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="back.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/js/all.min.js"></script>

<title>Order Details - C25 Cafe</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

/* =========================
BASE
========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:#f5f5f5;
  padding:20px;
  padding-bottom:120px;
}

/* =========================
HEADER
========================= */

.header{
  background:#fff;
  padding:15px;
  border-radius:16px;
  display:flex;
  align-items:center;
  gap:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.header img{
  width:45px;
  height:45px;
  border-radius:12px;
}

/* =========================
ITEMS
========================= */

.items{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.item{
  background:#fff;
  padding:12px;
  border-radius:14px;
  display:flex;
  gap:12px;
  align-items:center;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.item img{
  width:70px;
  height:70px;
  border-radius:12px;
  object-fit:cover;
}

.item h3{
  font-size:16px;
}

.item p{
  font-size:13px;
  color:#666;
}

.item span{
  font-weight:700;
  color:#ff6b00;
}

/* =========================
USER BOX
========================= */

.user-box{
  margin-top:20px;
  background:#fff;
  padding:15px;
  border-radius:16px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.user-box h3{
  margin-bottom:10px;
}

.user-box input,
.user-box select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
}

/* =========================
BUTTONS
========================= */

.btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:700;
  margin-top:15px;
  cursor:pointer;
}

.save-btn{
  background:#111;
  color:#fff;
}

.pay-btn{
  background:#ff6b00;
  color:#fff;
}

/* =========================
FOOTER FIX
========================= */

.footer{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  background:#fff;
  padding:15px;
  box-shadow:0 -2px 10px rgba(0,0,0,.1);
}

</style>

</head>
<body>

<!-- ================= HEADER ================= -->

<div class="header">
  <img src="logo.png">
  <div>
    <h3>C25 Cafe & Bakery</h3>
    <p>Order Details</p>
  </div>
</div>

<!-- ================= ITEMS ================= -->

<div class="items" id="items"></div>

<!-- ================= USER BOX ================= -->

<div class="user-box">

  <h3>User Details</h3>

  <input id="uName" placeholder="Name">
  <input id="uPhone" placeholder="Phone">

  <select id="uPincode">
    <option value="193401">193401</option>
    <option value="193402">193402</option>
    <option value="193403">193403</option>
    <option value="193404">193404</option>
  </select>

  <input id="uLocation" placeholder="Location">

  <button class="btn save-btn" onclick="saveUser()">
    Save Changes
  </button>

</div>

<!-- ================= FOOTER ================= -->

<div class="footer">

  <button class="btn pay-btn" onclick="goToPayment()">
    Continue Payment
  </button>

</div>

<script>

/* ================= CART LOAD ================= */

let cart = JSON.parse(localStorage.getItem("cartBackup")) || [];
let user = JSON.parse(localStorage.getItem("c25user")) || {};

/* ================= SHOW ITEMS ================= */

const container = document.getElementById("items");

cart.forEach(item => {

  let qty = item.qty || 1;
  let price = Number(item.price);
  let total = price * qty;

  container.innerHTML += `
    <div class="item">

      <img src="${item.image}">

      <div>

        <h3>${item.name}</h3>

        <p>${item.description}</p>

        <p style="font-size:13px;color:#666;">
          Qty: ${qty}
        </p>

        <span>₹${total}</span>

      </div>

    </div>
  `;
});

/* ================= PREFILL USER ================= */

document.getElementById("uName").value = user.name || "";
document.getElementById("uPhone").value = user.phone || "";
document.getElementById("uPincode").value = user.pincode || "193401";
document.getElementById("uLocation").value = user.location || "";

/* ================= SAVE USER ================= */

function saveUser(){

  user.name = document.getElementById("uName").value;
  user.phone = document.getElementById("uPhone").value;
  user.pincode = document.getElementById("uPincode").value;
  user.location = document.getElementById("uLocation").value;

  localStorage.setItem("c25user", JSON.stringify(user));

  alert("Updated Successfully");
}

/* ================= PAYMENT ================= */

function goToPayment(){
  window.location.href = "payment.html";
}

</script>
<script src="back.js"></script>
<script>
  createBackButton();
</script>
</body>
</html>
