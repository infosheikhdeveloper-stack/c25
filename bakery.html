<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Bakery - C25 Cafe</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="back.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
BASE
========================= */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f4f6fb;
  padding-bottom:120px;
  padding-top:95px;
}

/* =========================
HEADER
========================= */

.top-header{
  width:100%;
  padding:15px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:fixed;
  top:0;
  left:0;

  z-index:1000;

  background:#f4f6fb;

  box-shadow:0 2px 15px rgba(0,0,0,0.05);
}

.logo-side{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:55px;
  height:55px;
  border-radius:18px;
  object-fit:cover;
}

.logo-side h2{
  font-size:19px;
  color:#111;
}

.logo-side p{
  font-size:13px;
  color:#777;
  margin-top:3px;
}

.logo-side i{
  color:#ff6b00;
}

.menu-btn{
  width:45px;
  height:45px;
  border:none;
  border-radius:15px;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  font-size:18px;
}

/* =========================
BANNER
========================= */

.banner{
  width:92%;
  margin:auto;
  height:220px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.banner img,
.banner video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner video{
  display:none;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.35);
}

.banner-text{
  position:absolute;
  bottom:22px;
  left:20px;
  color:#fff;
}

.banner-text h1{
  font-size:30px;
}

.banner-text p{
  font-size:14px;
  margin-top:5px;
}

/* =========================
CATEGORY TAG
========================= */

.category-tag{
  width:92%;
  margin:22px auto 10px;

  background:linear-gradient(135deg,#ff6b00,#ff934d);

  color:#fff;

  padding:18px 20px;

  border-radius:24px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  box-shadow:0 8px 20px rgba(255,107,0,0.25);
}

.category-tag h2{
  font-size:24px;
}

.category-tag span{
  font-size:13px;
  opacity:0.9;
}

/* =========================
PRODUCT GRID
========================= */

.products-grid{
  width:92%;
  margin:20px auto;

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

/* =========================
PRODUCT CARD
========================= */

.product-card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.product-card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.product-info{
  padding:12px;
}

.product-info h3{
  font-size:17px;
  color:#111;
}

.product-info p{
  font-size:12px;
  color:#777;
  margin-top:5px;

  height:34px;
  overflow:hidden;
}

.price-row{
  margin-top:12px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.price-row span{
  font-size:18px;
  font-weight:700;
  color:#111;
}

.price-row button{
  width:38px;
  height:38px;

  border:none;
  border-radius:12px;

  background:#ff6b00;
  color:#fff;

  font-size:18px;
  font-weight:700;
}

/* =========================
LOADING
========================= */

.loading{
  text-align:center;
  margin-top:40px;
  color:#777;
}

/* =========================
LOCATION ANIMATION
========================= */

#locationDisplay{
  display:inline-block;
  animation:fadeLoc 3s infinite;
}

@keyframes fadeLoc{

  0%{
    opacity:0;
    transform:translateY(-5px);
  }

  20%{
    opacity:1;
    transform:translateY(0);
  }

  50%{
    opacity:1;
  }

  70%{
    opacity:0;
    transform:translateY(5px);
  }

  100%{
    opacity:0;
  }

}

</style>

</head>

<body>

<!-- =========================
HEADER
========================= -->

<header class="top-header">

  <div class="logo-side">

    <img src="logo.png" class="logo">

    <div>

      <h2>C25 Cafe & Bakery</h2>

      <p>
        <i class="fa-solid fa-location-dot"></i>

        <span id="locationDisplay">
          Loading...
        </span>
      </p>

    </div>

  </div>



</header>

<!-- =========================
BANNER
========================= -->

<section class="banner">

  <!-- IMAGE -->
  <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=1200&auto=format&fit=crop">

  <!-- VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="bakery.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="banner-text">

    <h1>Fresh Bakery</h1>

    <p>
      Cakes, Pastries & Sweet Desserts
    </p>

  </div>

</section>

<!-- =========================
CATEGORY TAG
========================= -->

<div class="category-tag">

  <div>
    <h2>Bakery</h2>
    <span>Freshly baked everyday</span>
  </div>

  <i class="fa-solid fa-cake-candles"
  style="font-size:30px"></i>

</div>

<!-- =========================
PRODUCTS
========================= -->

<div id="products"
class="products-grid"></div>

<div id="loading"
class="loading">
Loading Bakery Products...
</div>

<script>

/* =========================
SUPABASE
========================= */

const supabaseClient =
supabase.createClient(

"https://sogyxzqvbquwrqlqpdaj.supabase.co",

"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"

);

/* =========================
LOAD LOCATION
========================= */

function loadUserLocation(){

  const user =
  JSON.parse(localStorage.getItem("c25user"));

  const display =
  document.getElementById("locationDisplay");

  if(!user){

    display.innerText =
    "Please Login";

    return;
  }

  const pincode =
  user.pincode || "N/A";

  const location =
  user.location || "Location";

  let showPincode = true;

  setInterval(()=>{

    if(showPincode){

      display.innerText =
      "Pincode: " + pincode;

    }

    else{

      display.innerText =
      location;

    }

    showPincode = !showPincode;

  },3000);

}

loadUserLocation();

/* =========================
LOAD BAKERY PRODUCTS
========================= */

async function loadProducts(){

  const container = document.getElementById("products");
  const loading = document.getElementById("loading");

  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .ilike("category","%bakery%");

  loading.style.display = "none";

  if(error){
    container.innerHTML = "Error loading products";
    console.log(error);
    return;
  }

  data.forEach(item => {

    container.innerHTML += `
      <div class="product-card"
      onclick='openDetail(${JSON.stringify(item)})'>

        <img src="${item.image}">

        <div class="product-info">

          <h3>${item.title}</h3>

          <p>${item.description}</p>

          <div class="price-row">

            <span>₹${item.price}</span>

            <button onclick='event.stopPropagation(); addToCart(
              "${item.title}",
              "${item.description}",
              "${item.price}",
              "${item.image}"
            )'>
              +
            </button>

          </div>

        </div>

      </div>
    `;
  });
}



/* ✅ THIS MUST BE OUTSIDE */
function openDetail(item){
  localStorage.setItem("selectedProduct", JSON.stringify(item));
  window.location.href = "detailbakery.html";
}

loadProducts();

/* =========================
ADD TO CART
========================= */

function addToCart(
name,
description,
price,
image
){

  let cart =
  JSON.parse(localStorage.getItem("c25cart")) || [];

  cart.push({
    name,
    description,
    price,
    image
  });

  localStorage.setItem(
    "c25cart",
    JSON.stringify(cart)
  );

  alert("Added to cart");

}

</script>
<script src="back.js"></script>
<script>
  createBackButton();
</script>
</body>
</html>
