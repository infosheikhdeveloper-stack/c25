<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Bakery - C25 Cafe</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="back.css">
<link rel="stylesheet" href="3D.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* =========================
BASE
========================= */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  background:#f4f6fb;
  padding-bottom:120px;
  padding-top:95px;
}

/* =========================
HEADER
========================= */

.top-header{
  width:100%;
  padding:15px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  position:fixed;
  top:0;
  left:0;

  z-index:1000;

  background:#f4f6fb;

  box-shadow:0 2px 15px rgba(0,0,0,0.05);
}

.logo-side{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:55px;
  height:55px;
  border-radius:18px;
  object-fit:cover;
}

.logo-side h2{
  font-size:19px;
  color:#111;
}

.logo-side p{
  font-size:13px;
  color:#777;
  margin-top:3px;
}

.logo-side i{
  color:#ff6b00;
}

.menu-btn{
  width:45px;
  height:45px;
  border:none;
  border-radius:15px;
  background:#fff;
  box-shadow:0 5px 15px rgba(0,0,0,0.08);
  font-size:18px;
}

/* =========================
BANNER
========================= */

.banner{
  width:92%;
  margin:auto;
  height:220px;
  border-radius:28px;
  overflow:hidden;
  position:relative;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.banner img,
.banner video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.banner video{
  display:none;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  background:rgba(0,0,0,0.35);
}

.banner-text{
  position:absolute;
  bottom:22px;
  left:20px;
  color:#fff;
}

.banner-text h1{
  font-size:30px;
}

.banner-text p{
  font-size:14px;
  margin-top:5px;
}

/* =========================
CATEGORY TAG
========================= */

.category-tag{
  width:92%;
  margin:22px auto 10px;

  background:linear-gradient(135deg,#ff6b00,#ff934d);

  color:#fff;

  padding:18px 20px;

  border-radius:24px;

  display:flex;
  justify-content:space-between;
  align-items:center;

  box-shadow:0 8px 20px rgba(255,107,0,0.25);
}

.category-tag h2{
  font-size:24px;
}

.category-tag span{
  font-size:13px;
  opacity:0.9;
}

/* =========================
PRODUCT GRID
========================= */

.products-grid{
  width:92%;
  margin:20px auto;

  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
}

/* =========================
PRODUCT CARD
========================= */

.product-card{
  background:#fff;
  border-radius:24px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.product-card img{
  width:100%;
  height:140px;
  object-fit:cover;
}

.product-info{
  padding:12px;
}

.product-info h3{
  font-size:17px;
  color:#111;
}

.product-info p{
  font-size:12px;
  color:#777;
  margin-top:5px;

  height:34px;
  overflow:hidden;
}

.price-row{
  margin-top:12px;

  display:flex;
  justify-content:space-between;
  align-items:center;
}

.price-row span{
  font-size:18px;
  font-weight:700;
  color:#111;
}

.price-row button{
  width:38px;
  height:38px;

  border:none;
  border-radius:12px;

  background:#ff6b00;
  color:#fff;

  font-size:18px;
  font-weight:700;
}

/* =========================
LOADING
========================= */

.loading{
  text-align:center;
  margin-top:40px;
  color:#777;
}

/* =========================
LOCATION ANIMATION
========================= */

#locationDisplay{
  display:inline-block;
  animation:fadeLoc 3s infinite;
}

@keyframes fadeLoc{

  0%{
    opacity:0;
    transform:translateY(-5px);
  }

  20%{
    opacity:1;
    transform:translateY(0);
  }

  50%{
    opacity:1;
  }

  70%{
    opacity:0;
    transform:translateY(5px);
  }

  100%{
    opacity:0;
  }

}
/* =========================
TOAST ALERT (GLOBAL)
========================= */

.toast {
  position: fixed;
  top: -100px;
  left: 50%;
  transform: translateX(-50%);
  min-width: 260px;
  max-width: 90%;
  padding: 14px 16px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  z-index: 99999;
  transition: 0.35s ease;
  font-weight: 600;
  color: #fff;
  backdrop-filter: blur(8px);
}

/* GREEN TRANSPARENT */
.toast.success {
  background: rgba(0, 200, 83, 0.35);
}

/* RED TRANSPARENT */
.toast.error {
  background: rgba(229, 57, 53, 0.35);
}

.toast.show {
  top: 20px;
}

.toast svg {
  width: 26px;
  height: 26px;
  flex-shrink: 0;
}


</style>

</head>

<body>

<!-- =========================
HEADER
========================= -->

<header class="top-header">

  <div class="logo-side">

    <img src="logo.png" class="logo">

    <div>

      <h2>C25 Cafe & Bakery</h2>

      <p>
        <i class="fa-solid fa-location-dot"></i>

        <span id="locationDisplay">
          Loading...
        </span>
      </p>

    </div>

  </div>



</header>

<!-- =========================
BANNER
========================= -->

<section class="banner">

  <!-- IMAGE -->
  <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff?q=80&w=1200&auto=format&fit=crop">

  <!-- VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="bakery.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="banner-text">

    <h1>Fresh Bakery</h1>

    <p>
      Cakes, Pastries & Sweet Desserts
    </p>

  </div>

</section>

<!-- =========================
CATEGORY TAG
========================= -->

<div class="category-tag">

  <div>
    <h2>Bakery</h2>
    <span>Freshly baked everyday</span>
  </div>

  <i class="fa-solid fa-cake-candles"
  style="font-size:30px"></i>

</div>

<!-- =========================
PRODUCTS
========================= -->

<div id="products"
class="products-grid"></div>

<div id="loading"
class="loading">
Loading Bakery Products...
</div>

<!-- =========================
3D FOOTER SECTION
PASTE BEFORE </body>
========================= -->

<section class="c25-3d-footer">
  <div class="footer-3d-content">

    <h1 class="footer-logo-3d">
      C25 Cafe & Bakery
    </h1>

    <p class="footer-tag">
      Fast Delivery • Fresh Food • Premium Taste
    </p>

    <div class="footer-mini-box">
      <div>
        <h3>30m</h3>
        <span>Delivery</span>
      </div>

      <div>
        <h3>100%</h3>
        <span>Fresh Food</span>
      </div>

      <div>
        <h3>4.9★</h3>
        <span>Rating</span>
      </div>
    </div>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>



/* =========================
LOAD LOCATION
========================= */

function loadUserLocation(){

  const user =
  JSON.parse(localStorage.getItem("c25user"));

  const display =
  document.getElementById("locationDisplay");

  if(!user){

    display.innerText =
    "Please Login";

    return;
  }

  const pincode =
  user.pincode || "N/A";

  const location =
  user.location || "Location";

  let showPincode = true;

  setInterval(()=>{

    if(showPincode){

      display.innerText =
      "Pincode: " + pincode;

    }

    else{

      display.innerText =
      location;

    }

    showPincode = !showPincode;

  },3000);

}

loadUserLocation();

/* =========================
LOAD BAKERY PRODUCTS
========================= */

async function loadProducts(){

  const container = document.getElementById("products");
  const loading = document.getElementById("loading");

  const { data, error } = await supabaseClient
    .from("products")
    .select("*")
    .ilike("category","%bakery%");

  loading.style.display = "none";

  if(error){
    container.innerHTML = "Error loading products";
    console.log(error);
    return;
  }

  data.forEach(item => {

    container.innerHTML += `
      <div class="product-card"
onclick='openDetail(
"${item.title}",
"${item.description}",
"${item.price}",
"${item.image}",
"${item.category}",
"${item.calories}",
"${item.protein}",
"${item.fat}",
"${item.sugar}",
"${item.freshness}"
)'>

<img src="${item.image}">

<div class="product-info">

<h3>${item.title}</h3>

<p>${item.description}</p>

<div class="price-row">

<span>₹${item.price}</span>

<button onclick='event.stopPropagation(); addToCart(
"${item.title}",
"${item.description}",
"${item.price}",
"${item.image}"
)'>+</button>

</div>

</div>

</div>
    `;
  });
}



/* ✅ THIS MUST BE OUTSIDE */
function openDetail(
title,
description,
price,
image,
category,
calories,
protein,
fat,
sugar,
freshness
){

const product = {
  title,
  description,
  price,
  image,
  category,
  calories,
  protein,
  fat,
  sugar,
  freshness
};

localStorage.setItem(
  "selectedProduct",
  JSON.stringify(product)
);

window.location.href =
"productdetail.html";

}
loadProducts();

/* =========================
ADD TO CART
========================= */

function addToCart(
name,
description,
price,
image
){

  let cart =
  JSON.parse(localStorage.getItem("c25cart")) || [];

  cart.push({
    name,
    description,
    price,
    image
  });

  localStorage.setItem(
    "c25cart",
    JSON.stringify(cart)
  );

  showToast("Added to cart");

}

</script>
<script src="back.js"></script>
<script>
  createBackButton();
</script>
<script>
function showToast(message, type = "success") {

  const icons = {
    success: `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="white"/>
        <path d="M10 14l-2.5-2.5L6 13l4 4 8-8-1.5-1.5z" fill="black"/>
      </svg>
    `,
    error: `
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" fill="white"/>
        <path d="M9 9l6 6M15 9l-6 6"
          stroke="black" stroke-width="2" stroke-linecap="round"/>
      </svg>
    `
  };

  const toast = document.createElement("div");
  toast.className = `toast ${type}`;

  toast.innerHTML = `
    ${icons[type]}
    <span>${message}</span>
  `;

  document.body.appendChild(toast);

  setTimeout(() => toast.classList.add("show"), 50);

  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}
</script>

</body>
</html>
