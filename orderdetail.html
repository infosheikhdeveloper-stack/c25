<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Order Detail</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
background:#f5f5f7;
padding:18px;
padding-bottom:120px;
color:#111827;
}

.header{
display:flex;
align-items:center;
gap:14px;
padding:14px 10px;
margin-bottom:18px;
background:#fff;
border-radius:18px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
position:sticky;
top:10px;
z-index:999;
}
.title h2{
font-size:22px;
font-weight:900;
margin:0;
}

.title p{
font-size:12px;
color:#6b7280;
margin-top:2px;
}


.back{
width:46px;
height:46px;
border:none;
border-radius:14px;
background:#f3f4f6;
box-shadow:none;
font-size:16px;
}

.card{
background:#fff;
padding:18px;
border-radius:20px;
margin-bottom:18px;
box-shadow:0 5px 18px rgba(0,0,0,.06);
}

/* TOP ORDER */
.order-top{
display:flex;
justify-content:space-between;
align-items:flex-start;
}

.order-id{
font-size:18px;
font-weight:900;
}

.badge{
padding:6px 12px;
border-radius:12px;
font-size:12px;
font-weight:800;
}

.pending{background:#fff7ed;color:#f97316;}
.accepted{background:#ecfeff;color:#06b6d4;}
.rejected{background:#fee2e2;color:#ef4444;}

/* INFO GRID */
.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
font-size:13px;
color:#374151;
}

/* TIMELINE WRAPPER */
.timeline{
display:flex;
align-items:center;
justify-content:space-between;
position:relative;
margin-top:20px;
padding:10px 5px;
}

/* BACK LINE */
.timeline::before{
content:"";
position:absolute;
top:22px;
left:0;
right:0;
height:3px;
background:#e5e7eb;
z-index:0;
}

/* STEP */
.step{
display:flex;
flex-direction:column;
align-items:center;
z-index:1;
flex:1;
font-size:12px;
font-weight:600;
color:#6b7280;
}

/* DOT */
.dot{
width:42px;
height:42px;
border-radius:50%;
background:#e5e7eb;
display:flex;
align-items:center;
justify-content:center;
margin-bottom:6px;
transition:0.3s;
}

/* ACTIVE */
.step.active{
color:#16a34a;
}

.step.active .dot{
background:#16a34a;
color:#fff;
box-shadow:0 6px 15px rgba(22,163,74,0.3);
}
/* ITEMS */
.item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}

.left{
display:flex;
gap:10px;
align-items:center;
}

.item img{
width:55px;
height:55px;
border-radius:12px;
object-fit:cover;
}

.qty{
background:#111;
color:#fff;
padding:3px 8px;
border-radius:10px;
font-size:12px;
}

/* BILL */
.bill{
font-weight:900;
font-size:18px;
}

.row{
display:flex;
justify-content:space-between;
padding:6px 0;
font-size:14px;
}

.total{
font-size:20px;
font-weight:900;
color:#16a34a;
text-align:right;
margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
<button class="back" onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<div class="title">
  <h2>Order Detail</h2>
  <p>Live order tracking</p>
</div>
</div>

<div id="app"></div>

<script>

const client = supabase.createClient(
"https://sogyxzqvbquwrqlqpdaj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"
);

const urlParams = new URLSearchParams(window.location.search);
const orderId =
urlParams.get("id") ||
localStorage.getItem("selectedOrderId");

async function load(){

const container = document.getElementById("app");

const { data, error } = await client
.from("orders")
.select("*")
.eq("id", orderId)
.single();

if(error || !data){
container.innerHTML = "<h3>Order not found</h3>";
return;
}

/* ITEMS */
let items = [];
try{
items = typeof data.items === "string"
? JSON.parse(data.items)
: data.items || [];
}catch{items=[];}

let itemsHTML = "";
items.forEach(i=>{
itemsHTML += `
<div class="item">
<div class="left">
<img src="${i.image}">
<div>
<b>${i.name}</b><br>
<small>${i.description || ''}</small>
</div>
</div>
<div>
<div class="qty">x${i.qty || 1}</div>
<div>₹${i.price}</div>
</div>
</div>
`;
});

/* STATUS */
const status = (data.status || "pending").toLowerCase();

let badgeClass =
status === "accepted" ? "accepted" :
status === "rejected" ? "rejected" : "pending";

container.innerHTML = `

<div class="card">

<div class="order-top">
<div>
<div class="order-id">#${data.id}</div>
<div>${data.name} | ${data.phone}</div>
<div>${data.email}</div>
</div>

<span class="badge ${badgeClass}">
${status}
</span>
</div>

<div class="info">
<div><i class="fa-regular fa-calendar"></i> ${new Date(data.created_at).toLocaleDateString()}</div>
<div><i class="fa-solid fa-location-dot"></i> ${data.location}</div>
<div><i class="fa-solid fa-map"></i> ${data.pincode}</div>
<div><i class="fa-solid fa-wallet"></i> ${data.payment_method}</div>
</div>

</div>

<!-- STATUS -->
<div class="card">
<h3>Status: ${status}</h3>
<p>Order is currently ${status}</p>
</div>

<!-- TIMELINE -->
<div class="card">
<h3>Delivery Timeline</h3>

<div class="timeline">

  <div class="step active">
    <div class="dot"><i class="fa-solid fa-check"></i></div>
    <span>Assigned</span>
  </div>

  <div class="step ${status !== "pending" ? "active" : ""}">
    <div class="dot"><i class="fa-solid fa-check"></i></div>
    <span>Accepted</span>
  </div>

  <div class="step">
    <div class="dot"><i class="fa-solid fa-box"></i></div>
    <span>Picked Up</span>
  </div>

  <div class="step">
    <div class="dot"><i class="fa-solid fa-motorcycle"></i></div>
    <span>Out</span>
  </div>

  <div class="step ${status === "delivered" ? "active" : ""}">
    <div class="dot"><i class="fa-solid fa-house"></i></div>
    <span>Delivered</span>
  </div>

</div>
</div>

<!-- ITEMS -->
<div class="card">
<h3>Items</h3>
${itemsHTML}
</div>

<!-- BILL -->
<div class="card">
<h3 class="bill">Invoice Bill</h3>

<div class="row"><span>Subtotal</span><span>₹${data.subtotal}</span></div>
<div class="row"><span>Delivery</span><span>₹${data.delivery}</span></div>

<div class="row"><span>Payment</span><span>${data.payment_method}</span></div>

<div class="total">
Grand Total: ₹${data.total}
</div>

</div>

`;

}

load();

</script>

</body>
</html>
