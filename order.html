<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Orders - C25 Cafe</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="back.css">
<link rel="stylesheet" href="nav.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* RESET + BASE */
html, body{
height:100%;
margin:0;
padding:0;
overflow-x:hidden;
overflow-y:auto;
font-family:Poppins, sans-serif;
background:#f4f6fb;
color:#111827;
}

/* PAGE WRAPPER FEEL */
body{
padding:18px;
padding-bottom:110px; /* bottom nav safe space */
box-sizing:border-box;
}

/* HEADER */
.header{
background:#fff;
padding:18px;
border-radius:20px;
box-shadow:0 6px 18px rgba(0,0,0,.06);
margin-bottom:18px;
position:sticky;
top:10px;
z-index:10;
}

.header h1{
margin:0;
font-size:28px;
font-weight:900;
}

.header p{
margin-top:4px;
font-size:13px;
color:#6b7280;
}

/* EMPTY STATE */
.empty{
text-align:center;
margin-top:80px;
padding:30px;
}

.empty i{
font-size:90px;
color:#d1d5db;
margin-bottom:15px;
}

.empty h2{
font-size:26px;
margin:0;
}

.empty p{
color:#6b7280;
margin-top:6px;
}

/* ORDER CARD */
.order-card{
background:#fff;
border-radius:22px;
padding:16px;
margin-bottom:14px;
box-shadow:0 5px 18px rgba(0,0,0,.05);
border-left:5px solid #ff9800;
}

/* TOP ROW */
.order-top{
display:flex;
justify-content:space-between;
align-items:center;
}

.order-id{
font-size:18px;
font-weight:900;
}

/* STATUS BADGE */
.status{
font-size:12px;
font-weight:800;
padding:6px 10px;
border-radius:12px;
background:#fff3cd;
color:#d97706;
text-transform:capitalize;
}

.status.delivered{
background:#dcfce7;
color:#16a34a;
}

.status.cancelled{
background:#fee2e2;
color:#dc2626;
}

/* META INFO */
.order-meta{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:12px;
font-size:12px;
color:#555;
}

.meta-box{
display:flex;
gap:8px;
align-items:center;
}

/* PRODUCTS */
.product{
display:flex;
gap:10px;
margin-top:10px;
background:#f9fafb;
padding:10px;
border-radius:14px;
}

.product img{
width:55px;
height:55px;
border-radius:12px;
object-fit:cover;
}

.qty{
font-size:12px;
background:#111;
color:#fff;
padding:3px 8px;
border-radius:10px;
}

/* BUTTON */
.btn{
width:100%;
margin-top:10px;
padding:12px;
border:none;
border-radius:14px;
background:#ffccd5;
font-weight:800;
color:#be123c;
cursor:pointer;
transition:0.2s;
}

.btn:active{
transform:scale(0.98);
}

/* SCROLL SAFETY FIX (IMPORTANT FOR MOBILE NAV) */
#orders{
padding-bottom:120px;
}

/* LOADER */
#loader{
text-align:center;
margin-top:40px;
color:#6b7280;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<h1>My Orders</h1>
<p>Track your order history</p>
</div>

<div id="loader">Loading...</div>
<div id="orders"></div>


<!-- =========================
BOTTOM NAVIGATION
LINKABLE NAVBAR
========================= -->

<nav class="bottom-nav">

  <!-- HOME -->
  <a href="index.html" class="nav-item active">

    <i class="fa-solid fa-house"></i>

    <span>Home</span>

  </a>



  <!-- CART -->
<a href="cart.html" class="nav-item cart-nav">

  <div class="cart-icon-box">

    <i class="fa-solid fa-cart-shopping"></i>

    <span id="cartCount">0</span>

  </div>

  <span>Cart</span>

</a>



  <!-- ORDER -->
  <a href="order.html" class="nav-item">

    <i class="fa-solid fa-bag-shopping"></i>

    <span>Your Order</span>

  </a>



  <!-- ACCOUNT -->
  <a href="account.html" class="nav-item">

    <i class="fa-solid fa-user"></i>

    <span>Account</span>

  </a>

</nav>

<script>

const client = supabase.createClient(
"https://sogyxzqvbquwrqlqpdaj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNvZ3l4enF2YnF1d3JxbHFwZGFqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1OTI0MjcsImV4cCI6MjA5NDE2ODQyN30.kubX_vDW8CiHJR7HLXs7-5RpeNI6DBlJLgt4uEhBEFE"
);

const user = JSON.parse(localStorage.getItem("c25user")) || {};

async function loadOrders(){

const loader = document.getElementById("loader");
const container = document.getElementById("orders");

if(!user.email){

loader.innerHTML = `
<div class="empty">
<i class="fa-solid fa-user"></i>
<h2>Please Login</h2>
<p>Login to see your orders</p>
</div>`;
return;
}

const { data, error } = await client
.from("orders")
.select("*")
.eq("email", user.email)
.order("created_at", { ascending:false });

if(!data || data.length === 0){

loader.innerHTML = `
<div class="empty">
<i class="fa-solid fa-cart-shopping"></i>
<h2>No Orders Yet</h2>
<p>You haven’t placed any order</p>
</div>`;
return;
}

loader.style.display = "none";
container.innerHTML = "";

data.forEach(order=>{

let items = [];
try{
items = typeof order.items === "string"
? JSON.parse(order.items)
: order.items || [];
}catch{
items = [];
}

let productsHTML = "";

items.forEach(i=>{
productsHTML += `
<div class="product">
<img src="${i.image}">
<div>
<b>${i.name}</b><br>
<span class="qty">x${i.qty || 1}</span><br>
₹${i.price}
</div>
</div>`;
});

let statusClass = order.status?.toLowerCase();

container.innerHTML += `
<div class="order-card">

<div class="order-top">
<div class="order-id">Order #${order.id.slice(0,8)}</div>

<div class="status ${statusClass}">
${order.status || "pending"}
</div>
</div>

<div class="order-meta">
<div class="meta-box"><i class="fa-solid fa-user"></i> ${order.name}</div>
<div class="meta-box"><i class="fa-solid fa-phone"></i> ${order.phone}</div>
<div class="meta-box"><i class="fa-solid fa-location-dot"></i> ${order.location}</div>
<div class="meta-box"><i class="fa-regular fa-calendar"></i> ${new Date(order.created_at).toLocaleDateString()}</div>
</div>

${productsHTML}

<button class="btn" onclick="openOrderDetail('${order.id}')">
View Order
</button>

</div>`;
});

}

function openOrderDetail(id){
window.location.href = `orderdetail.html?id=${id}`;
}

loadOrders();

</script>
<script src="back.js"></script>
<script>
  createBackButton();
</script>
</body>
</html>
